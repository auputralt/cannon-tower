<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0c1830">
<title>Cannon Keep — Tower Defense</title>
<style>
:root{
  --bg:#13233c; --bg2:#0c1830; --panel:#1d3050; --panel2:#27406a; --line:#35507c;
  --gold:#ffc94d; --gold2:#f5a623; --gold-dk:#b87d12; --txt:#eef4ff; --dim:#9fb3d4;
  --red:#ff5d5d; --red-dk:#a33333; --green:#67d066; --ice:#4ecbe8; --wood:#d98e2b;
  --font:ui-rounded,'SF Pro Rounded','Hiragino Maru Gothic ProN','Arial Rounded MT Bold','Trebuchet MS','Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:var(--font);color:var(--txt);
  background:radial-gradient(120% 90% at 50% 0%,var(--bg) 0%,var(--bg2) 70%);
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
#app{height:100dvh;display:flex;flex-direction:column}

/* ---------- HUD ---------- */
#hud{
  display:flex;align-items:center;gap:5px;flex-wrap:nowrap;
  padding:calc(8px + env(safe-area-inset-top)) 8px 8px;
}
.chip{
  display:flex;align-items:center;gap:4px;white-space:nowrap;
  background:rgba(29,48,80,.85);border:1px solid var(--line);border-radius:999px;
  padding:6px 10px;font-size:13px;font-weight:700;min-height:34px;
}
.chip .ic{font-size:12px;line-height:1}
#chipLives .ic{color:var(--red)}
.coin{display:inline-block;width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffe9a8,var(--gold) 55%,var(--gold-dk));
  box-shadow:0 0 0 1px rgba(0,0,0,.25) inset;flex:none}
.chip .lbl{font-size:9px;letter-spacing:.06em;color:var(--dim);font-weight:800}
#chipFoes .ic{color:#c39bf0}
#hud .spacer{flex:1}
.sqbtn{
  min-width:42px;min-height:42px;border:1px solid var(--line);border-radius:13px;
  background:var(--panel);color:var(--txt);font:800 14px var(--font);cursor:pointer;flex:none;
}
.sqbtn.on{background:var(--gold);border-color:var(--gold);color:#3a2a05}

/* ---------- Stage ---------- */
#stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;padding:4px}
canvas{display:block;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.06);touch-action:none}
#toast{
  position:absolute;left:50%;bottom:14px;transform:translateX(-50%) translateY(8px);
  background:rgba(12,22,42,.95);border:1px solid var(--gold);color:var(--gold);
  padding:10px 18px;border-radius:999px;font-weight:800;font-size:14px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:92%;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#banner{
  position:absolute;top:16%;left:50%;transform:translateX(-50%);
  font-weight:900;font-size:clamp(26px,7vw,42px);letter-spacing:.04em;color:#fff;
  text-shadow:0 3px 0 rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.4);
  opacity:0;pointer-events:none;white-space:nowrap;
}
#banner.go{animation:bannerIn 1.7s ease forwards}
@keyframes bannerIn{
  0%{opacity:0;transform:translateX(-50%) scale(.6)}
  14%{opacity:1;transform:translateX(-50%) scale(1.06)}
  24%{transform:translateX(-50%) scale(1)}
  72%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) scale(1)}
}
#hurt{
  position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .55s;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(255,40,40,.5));
}
#hurt.on{opacity:1;transition:opacity .05s}

/* ---------- Dock ---------- */
#dock{
  padding:8px 12px calc(10px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;align-items:center;gap:6px;min-height:104px;justify-content:center;
}
button.big{
  width:100%;max-width:340px;min-height:54px;border:none;border-radius:16px;cursor:pointer;
  font:800 18px var(--font);color:#3a2a05;letter-spacing:.02em;
  background:linear-gradient(180deg,#ffd76a,var(--gold2));
  box-shadow:0 4px 0 var(--gold-dk),0 8px 18px rgba(0,0,0,.35);
}
button.big:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-dk)}
button.ghost{
  width:100%;max-width:340px;min-height:48px;border:1px solid var(--line);border-radius:14px;cursor:pointer;
  background:transparent;color:var(--dim);font:800 15px var(--font);
}
#startBtn{display:none}#startBtn.show{display:block}
#tip{display:none;font-size:13px;color:var(--dim);font-weight:700;text-align:center;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center}
#tip.show{display:flex}
#tip .g{color:var(--gold)}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:-1px;box-shadow:0 0 0 1.5px rgba(0,0,0,.3) inset}

/* tower / build panels */
.sheet{display:none;width:100%;max-width:460px;background:var(--panel);border:1px solid var(--line);
  border-radius:18px;padding:10px 12px;flex-direction:column;gap:8px}
.sheet.show{display:flex}
.sheet-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sheet-head .name{font-size:16px;font-weight:800;color:var(--gold)}
.sheet-head .info{font-size:13px;color:var(--dim);font-weight:700}
.prow{display:flex;gap:8px}
.prow button{
  flex:1;min-height:52px;border:none;border-radius:14px;cursor:pointer;
  font:800 15px var(--font);display:flex;align-items:center;justify-content:center;gap:6px;
}
#upBtn{background:linear-gradient(180deg,#ffd76a,var(--gold2));color:#3a2a05;box-shadow:0 3px 0 var(--gold-dk)}
#upBtn:disabled{background:#2c3f60;color:#6e82a6;box-shadow:none;cursor:default}
#sellBtn{background:linear-gradient(180deg,#ff7a7a,#e05252);color:#3d0d0d;box-shadow:0 3px 0 var(--red-dk)}
.xbtn{flex:0 0 52px!important;background:var(--panel2);color:var(--txt);font-size:18px}
.prow button:active:not(:disabled){transform:translateY(2px);box-shadow:none}
.bopt{
  flex:1;min-height:68px;border:1px solid var(--line);border-radius:14px;cursor:pointer;
  background:var(--panel2);color:var(--txt);font:800 13px var(--font);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;
}
.bopt .ticon{width:17px;height:17px;border-radius:50%;box-shadow:0 0 0 2px rgba(0,0,0,.3) inset}
.bopt .cost{font-size:12px;color:var(--gold)}
.bopt .sub{font-size:10px;color:var(--dim);font-weight:700}
.bopt:disabled{opacity:.38;cursor:default}
.bopt:active:not(:disabled){transform:translateY(2px)}

/* ---------- Overlays ---------- */
.screen{
  position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
  background:radial-gradient(110% 90% at 50% 10%,rgba(19,35,60,.94),rgba(7,14,28,.97));
  padding:20px;
}
.screen.show{display:flex}
.card{
  width:100%;max-width:390px;max-height:calc(100dvh - 40px);overflow:auto;
  background:rgba(15,28,50,.92);border:1px solid var(--line);border-radius:26px;
  padding:26px 22px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5);
  display:flex;flex-direction:column;gap:12px;
}
.card h1{
  font-size:clamp(36px,11vw,54px);line-height:.95;letter-spacing:.04em;color:var(--gold);
  text-shadow:0 3px 0 var(--gold-dk),0 8px 24px rgba(245,166,35,.25);
}
.card h2{font-size:24px;color:var(--gold);letter-spacing:.05em}
.card .sub{color:var(--dim);font-weight:800;letter-spacing:.25em;font-size:12px;text-transform:uppercase}
.cannon-art{font-size:42px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
ul.how{list-style:none;text-align:left;display:flex;flex-direction:column;gap:9px}
ul.how li{
  background:rgba(29,48,80,.6);border:1px solid var(--line);border-radius:14px;
  padding:10px 14px;font-size:14px;font-weight:600;line-height:1.35;
}
ul.how b{color:var(--gold)}
#endMsg{color:var(--dim);font-weight:700;font-size:15px;line-height:1.5}
#endScr.lose h1{color:var(--red);text-shadow:0 3px 0 var(--red-dk),0 8px 24px rgba(255,93,93,.25)}
.level-card{
  display:flex;align-items:center;gap:12px;text-align:left;width:100%;
  background:var(--panel);border:1px solid var(--line);border-radius:18px;cursor:pointer;
  padding:14px 16px;color:var(--txt);font-family:var(--font);min-height:72px;
}
.level-card:active:not(:disabled){transform:translateY(2px)}
.level-card:disabled{opacity:.45;cursor:default}
.level-card .thumb{width:44px;height:44px;border-radius:12px;flex:none;box-shadow:0 0 0 2px rgba(0,0,0,.25) inset}
.level-card .meta{flex:1;display:flex;flex-direction:column;gap:2px}
.level-card .lname{font-size:17px;font-weight:800}
.level-card .ldesc{font-size:12px;color:var(--dim);font-weight:700}
.level-card .stars{color:var(--gold);font-size:13px;letter-spacing:2px}
.level-card .badge{font-size:11px;font-weight:800;color:var(--green)}
.endrow{display:flex;flex-direction:column;gap:9px}

/* short screens (landscape phones): side rails instead of stacked bars */
@media(max-height:520px){
  #app{flex-direction:row}
  #hud{flex-direction:column;align-items:stretch;justify-content:center;gap:7px;
    padding:10px 8px 10px calc(10px + env(safe-area-inset-left))}
  #hud .spacer{display:none}
  .chip{justify-content:center}
  #stage{padding:8px 4px}
  #dock{width:240px;min-height:0;justify-content:center;
    padding:10px calc(10px + env(safe-area-inset-right)) 10px 6px}
  .sheet .prow{flex-wrap:wrap}
  .sheet #upBtn{flex:1 1 100%}
  .bopt{flex:1 1 42%}
  #bopts .xbtn{flex:1 1 42%!important}
  .sheet-head{flex-direction:column;align-items:flex-start;gap:2px}
}
@media(min-width:700px) and (min-height:521px){
  .chip{font-size:16px;padding:8px 16px;gap:6px}
  #hud{padding-left:18px;padding-right:18px;gap:10px}
  #tip{font-size:14px}
  .card{max-width:430px}
}
</style>
</head>
<body>
<div id="app">
  <header id="hud">
    <div class="chip" id="chipLives"><span class="ic">♥</span><b id="lives">15</b></div>
    <div class="chip"><span class="coin"></span><b id="gold">130</b></div>
    <div class="chip"><span class="lbl">W</span><b id="wave">1/8</b></div>
    <div class="chip" id="chipFoes"><span class="ic">☠</span><b id="left">0</b></div>
    <div class="spacer"></div>
    <button class="sqbtn on" id="sndBtn" aria-label="sound">🔊</button>
    <button class="sqbtn" id="speedBtn" aria-label="game speed">1×</button>
  </header>

  <main id="stage">
    <canvas id="cv"></canvas>
    <div id="banner"></div>
    <div id="toast"></div>
  </main>

  <footer id="dock">
    <button class="big" id="startBtn">▶ Start Wave 1</button>
    <div id="tip"></div>
    <div class="sheet" id="towerPanel">
      <div class="sheet-head"><span class="name" id="pname">Cannon · Lv 1</span><span class="info" id="pinfo"></span></div>
      <div class="prow">
        <button id="upBtn">⬆ Upgrade</button>
        <button id="sellBtn">Sell</button>
        <button class="xbtn" id="closeBtn" aria-label="close">✕</button>
      </div>
    </div>
    <div class="sheet" id="buildPanel">
      <div class="sheet-head"><span class="name">Build a tower</span><span class="info" id="binfo"></span></div>
      <div class="prow" id="bopts"></div>
    </div>
  </footer>
</div>
<div id="hurt"></div>

<div class="screen show" id="titleScr">
  <div class="card">
    <div class="cannon-art">💣🏰</div>
    <h1>CANNON<br>KEEP</h1>
    <p class="sub">Tower Defense</p>
    <ul class="how">
      <li><b>Tap a pad ◯</b> and choose a tower — <b>Cannon</b>, rapid <b>Ballista</b> or slowing <b>Frost</b>.</li>
      <li><b>Tap a tower</b> to upgrade its power or sell it back.</li>
      <li>Clear every wave across <b>3 maps</b> — beat one to unlock the next!</li>
    </ul>
    <button class="big" id="playBtn">▶ Play</button>
  </div>
</div>

<div class="screen" id="levelScr">
  <div class="card">
    <h2>CHOOSE A MAP</h2>
    <div class="endrow" id="levelList"></div>
    <button class="ghost" id="backBtn">← Title</button>
  </div>
</div>

<div class="screen" id="endScr">
  <div class="card">
    <h1 id="endTitle">VICTORY!</h1>
    <p id="endMsg"></p>
    <div class="endrow">
      <button class="big" id="nextBtn">▶ Next Map</button>
      <button class="big" id="againBtn">↻ Replay</button>
      <button class="ghost" id="levelsBtn">☰ Map Select</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ================= data ================= */
const LW=480, LH=640;
const E_TYPES={
  b:{r:13,hp:42, sp:55,gold:6, lives:1,c1:'#ff7a5c',c2:'#c93f28'},
  f:{r:10,hp:24, sp:96,gold:7, lives:1,c1:'#ffd23f',c2:'#cf8e0e'},
  t:{r:18,hp:135,sp:33,gold:14,lives:2,c1:'#b07ce8',c2:'#6f42ab'},
  x:{r:24,hp:520,sp:26,gold:60,lives:5,c1:'#e0567a',c2:'#8d2347'},
};
const TOWER_TYPES={
  cannon:{name:'Cannon',sub:'splash',cost:50,up:[45,75],splash:30,spd:340,color:'#5f739c',
    lv:[{dmg:12,range:95,rate:1.1},{dmg:20,range:106,rate:1.3},{dmg:34,range:118,rate:1.55}]},
  bolt:{name:'Ballista',sub:'rapid',cost:40,up:[35,60],splash:0,spd:520,color:'#d98e2b',
    lv:[{dmg:5,range:108,rate:2.6},{dmg:8,range:118,rate:3.1},{dmg:13,range:128,rate:3.6}]},
  frost:{name:'Frost',sub:'slows',cost:45,up:[40,70],splash:0,spd:300,color:'#4ecbe8',
    slow:[.35,.45,.55],slowDur:1.6,
    lv:[{dmg:4,range:90,rate:1.0},{dmg:6,range:98,rate:1.2},{dmg:9,range:106,rate:1.4}]},
};
const SELL_PCT=0.7;
const LEVELS=[
 {name:'Meadow Run',desc:'8 waves · gentle start',stars:1,gold:130,lives:15,hpBase:1,hpRamp:.12,
  pal:{g1:'#7ec850',g2:'#76bf49',pf:'#e7b876',pe:'#b98c4f',dash:'rgba(246,217,160,.8)',pad:'#cfc3a0',padE:'#a89a72'},
  path:[[-40,80],[400,80],[400,220],[80,220],[80,360],[400,360],[400,500],[80,500],[80,690]],
  spots:[[120,150],[240,150],[348,150],[136,290],[248,290],[360,290],[120,430],[240,430],[348,430],[200,570],[320,570]],
  waves:[
   [['b',8,1.0]],
   [['b',12,0.8]],
   [['b',6,0.8],['f',6,0.55]],
   [['t',3,1.6],['b',10,0.7]],
   [['f',12,0.5]],
   [['t',5,1.4],['f',6,0.5]],
   [['b',16,0.5],['f',8,0.45]],
   [['t',7,1.2],['b',10,0.5],['f',8,0.4]],
  ]},
 {name:'Dusty Dunes',desc:'10 waves · twisting trail',stars:2,gold:150,lives:15,hpBase:1.05,hpRamp:.16,
  pal:{g1:'#d8c27a',g2:'#cfb86e',pf:'#c98850',pe:'#96603a',dash:'rgba(240,205,160,.85)',pad:'#efe1b0',padE:'#b3a06e'},
  path:[[240,-40],[240,140],[80,140],[80,520],[240,520],[240,300],[400,300],[400,690]],
  spots:[[100,60],[330,80],[160,200],[310,225],[160,330],[310,390],[160,460],[310,560],[448,440],[90,600]],
  waves:[
   [['b',9,0.9]],
   [['b',12,0.75]],
   [['b',6,0.75],['f',7,0.5]],
   [['t',3,1.5],['b',10,0.65]],
   [['f',12,0.45],['b',8,0.6]],
   [['t',5,1.3],['f',8,0.5]],
   [['b',18,0.5],['f',8,0.4]],
   [['t',7,1.2],['b',12,0.5]],
   [['f',16,0.38],['t',6,1.1]],
   [['x',1,2],['t',6,1.1],['f',10,0.38]],
  ]},
 {name:'Frostpeak Pass',desc:'12 waves · the long siege',stars:3,gold:170,lives:12,hpBase:1.25,hpRamp:.18,
  pal:{g1:'#cfe3ec',g2:'#c2d9e4',pf:'#b0906b',pe:'#7e6448',dash:'rgba(238,222,200,.85)',pad:'#e9f2f6',padE:'#93b2c2'},
  path:[[-40,60],[400,60],[400,180],[80,180],[80,300],[400,300],[400,420],[80,420],[80,540],[400,540],[400,690]],
  spots:[[140,120],[260,120],[220,240],[340,240],[140,360],[260,360],[220,480],[340,480]],
  waves:[
   [['b',10,0.8]],
   [['f',10,0.5]],
   [['b',10,0.6],['f',6,0.5]],
   [['t',4,1.4],['b',8,0.6]],
   [['f',14,0.4],['b',8,0.5]],
   [['x',1,0],['t',4,1.4]],
   [['b',20,0.45],['f',10,0.4]],
   [['t',8,1.1],['f',8,0.45]],
   [['f',20,0.35],['t',5,1.2]],
   [['x',2,6],['b',12,0.5]],
   [['t',10,1.0],['f',12,0.4]],
   [['x',3,5],['t',6,1.2],['f',10,0.35]],
  ]},
];
const el=id=>document.getElementById(id);
const cv=el('cv'), ctx=cv.getContext('2d');

/* ================= audio (all synthesized, offline) ================= */
const A={
  ctx:null,mode:0, /* 0 = music+sfx, 1 = sfx only, 2 = silent */
  last:{},step:0,nextT:0,timer:null,noiseBuf:null,
  init(){
    if(this.ctx)return;
    const C=window.AudioContext||window.webkitAudioContext; if(!C)return;
    this.ctx=new C();
    this.master=this.ctx.createGain(); this.master.gain.value=.6; this.master.connect(this.ctx.destination);
    this.sfxG=this.ctx.createGain(); this.sfxG.gain.value=1; this.sfxG.connect(this.master);
    this.musG=this.ctx.createGain(); this.musG.gain.value=.16; this.musG.connect(this.master);
    this.noiseBuf=this.ctx.createBuffer(1,this.ctx.sampleRate*.5,this.ctx.sampleRate);
    const d=this.noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    this.applyMode();
    this.nextT=this.ctx.currentTime+.1;
    this.timer=setInterval(()=>this.tick(),140);
  },
  applyMode(){
    if(!this.ctx)return;
    this.musG.gain.value=this.mode===0?.16:0;
    this.sfxG.gain.value=this.mode<2?1:0;
  },
  cycle(){
    this.init();
    this.mode=(this.mode+1)%3; this.applyMode();
    el('sndBtn').textContent=['🔊','🔔','🔇'][this.mode];
    el('sndBtn').classList.toggle('on',this.mode<2);
  },
  tone(dest,f0,f1,dur,type,vol,when){
    const t=this.ctx.currentTime+(when||0);
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t);
    if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0008,t+dur);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t+dur+.03);
  },
  noise(dest,dur,vol,freq,when){
    const t=this.ctx.currentTime+(when||0);
    const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuf;
    const f=this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0008,t+dur);
    s.connect(f); f.connect(g); g.connect(dest); s.start(t); s.stop(t+dur+.03);
  },
  sfx(name){
    if(!this.ctx||this.mode===2)return;
    const now=performance.now();
    if(this.last[name]&&now-this.last[name]<55)return; /* throttle bursts */
    this.last[name]=now;
    const S=this.sfxG;
    switch(name){
      case'shoot_cannon':this.tone(S,120,55,.12,'square',.16);this.noise(S,.07,.12,900);break;
      case'shoot_bolt':this.tone(S,950,500,.05,'triangle',.12);break;
      case'shoot_frost':this.tone(S,1150,1700,.09,'sine',.1);break;
      case'boom':this.noise(S,.16,.2,700);this.tone(S,170,50,.16,'sine',.18);break;
      case'hit':this.noise(S,.05,.1,1600);break;
      case'die':this.tone(S,880,0,.07,'square',.1);this.tone(S,1318,0,.1,'square',.1,.06);break;
      case'leak':this.tone(S,320,110,.32,'sawtooth',.2);this.tone(S,240,80,.32,'sawtooth',.14,.1);break;
      case'build':this.tone(S,160,90,.12,'sine',.22);this.noise(S,.06,.1,1200,.02);break;
      case'up':this.tone(S,523,0,.08,'square',.1);this.tone(S,659,0,.08,'square',.1,.07);this.tone(S,784,0,.14,'square',.12,.14);break;
      case'sell':this.tone(S,620,280,.18,'triangle',.14);break;
      case'wave':this.tone(S,196,196,.22,'sawtooth',.12);this.tone(S,294,294,.22,'sawtooth',.1,.05);break;
      case'click':this.tone(S,700,500,.04,'triangle',.08);break;
      case'err':this.tone(S,200,140,.14,'square',.12);break;
      case'win':[523,659,784,1046,1318].forEach((f,i)=>this.tone(S,f,0,.22,'square',.12,i*.13));break;
      case'lose':[330,247,196,147].forEach((f,i)=>this.tone(S,f,f*.94,.3,'sawtooth',.12,i*.22));break;
    }
  },
  /* gentle generative loop: Am F C G */
  tick(){
    if(!this.ctx)return;
    const SPB=60/104/2; /* eighth note */
    const CH=[[110,220,261.6,329.6],[87.31,174.6,220,261.6],[130.81,261.6,329.6,392],[98,196,246.9,293.7]];
    const ARP=[1,2,3,2,3,2,1,2];
    while(this.nextT<this.ctx.currentTime+.45){
      const st=this.step%32, bar=(st/8)|0, pos=st%8, ch=CH[bar];
      const when=this.nextT-this.ctx.currentTime;
      if(pos===0||pos===3||pos===6)this.tone(this.musG,ch[0],0,.22,'square',.55,when);
      this.tone(this.musG,ch[ARP[pos]],0,.16,'triangle',.4,when);
      if(pos%2===1)this.noise(this.musG,.03,.16,7000,when);
      if(st===28)this.tone(this.musG,ch[3]*2,0,.3,'sine',.2,when);
      this.nextT+=SPB; this.step++;
    }
  }
};

/* ================= entities ================= */
class Enemy{
  constructor(type,wave,lv){
    const t=E_TYPES[type], m=lv.hpBase*(1+lv.hpRamp*(wave-1));
    this.type=type; this.r=t.r; this.speed=t.sp;
    this.maxHp=Math.round(t.hp*m); this.hp=this.maxHp;
    this.gold=t.gold+Math.floor(wave/4); this.livesCost=t.lives;
    this.x=G.path[0][0]; this.y=G.path[0][1]; this.node=1;
    this.dist=0; this.dx=1; this.dy=0; this.slowT=0; this.slowF=0;
    this.dead=false; this.finished=false; this.leaked=false;
    this.seed=Math.random()*7;
  }
  get alive(){return !this.dead&&!this.finished}
  update(dt){
    this.slowT-=dt;
    let rem=this.speed*(this.slowT>0?1-this.slowF:1)*dt;
    while(rem>0&&this.node<G.path.length){
      const tx=G.path[this.node][0],ty=G.path[this.node][1];
      const dx=tx-this.x,dy=ty-this.y,d=Math.hypot(dx,dy);
      if(d>0){this.dx=dx/d;this.dy=dy/d}
      if(d<=rem){this.x=tx;this.y=ty;rem-=d;this.dist+=d;this.node++}
      else{this.x+=this.dx*rem;this.y+=this.dy*rem;this.dist+=rem;rem=0}
    }
    if(this.node>=G.path.length)this.finished=true;
  }
}
class Tower{
  constructor(spot,type){
    this.spot=spot;this.x=spot.x;this.y=spot.y;this.type=type;
    this.lv=0;this.cool=0;this.angle=-Math.PI/2;this.flash=0;
    this.invested=TOWER_TYPES[type].cost;
  }
  get spec(){return TOWER_TYPES[this.type]}
  get s(){return this.spec.lv[this.lv]}
  update(dt,g){
    this.cool-=dt; this.flash=Math.max(0,this.flash-dt);
    const r2=this.s.range*this.s.range; let best=null;
    for(const e of g.enemies){
      if(!e.alive)continue;
      const dx=e.x-this.x,dy=e.y-this.y;
      if(dx*dx+dy*dy<=r2&&(!best||e.dist>best.dist))best=e;
    }
    if(best){
      this.angle=Math.atan2(best.y-this.y,best.x-this.x);
      if(this.cool<=0){
        g.shots.push(new Projectile(this,best));
        this.cool=1/this.s.rate; this.flash=0.09;
        A.sfx('shoot_'+this.type);
      }
    }
  }
}
class Projectile{
  constructor(tw,target){
    this.x=tw.x+Math.cos(tw.angle)*24; this.y=tw.y+Math.sin(tw.angle)*24;
    this.t=target; this.tx=target.x; this.ty=target.y;
    this.type=tw.type; this.spec=tw.spec; this.dmg=tw.s.dmg;
    this.slow=this.spec.slow?this.spec.slow[tw.lv]:0;
    this.spd=this.spec.spd; this.ang=tw.angle; this.done=false;
  }
  update(dt,g){
    if(this.t&&this.t.alive){this.tx=this.t.x;this.ty=this.t.y}
    const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.hypot(dx,dy),step=this.spd*dt;
    this.ang=Math.atan2(dy,dx);
    if(d<=Math.max(10,step)){this.explode(g);return}
    this.x+=dx/d*step; this.y+=dy/d*step;
  }
  explode(g){
    this.done=true;
    if(this.type==='cannon'){
      A.sfx('boom');
      g.rings.push({x:this.tx,y:this.ty,t:0,max:.22,r0:5,r1:24,c:'255,206,100'});
      g.spark(this.tx,this.ty,'#ffce64',4);
    }else if(this.type==='frost'){
      A.sfx('hit');
      g.rings.push({x:this.tx,y:this.ty,t:0,max:.25,r0:4,r1:18,c:'140,224,255'});
    }else{
      A.sfx('hit');
      g.rings.push({x:this.tx,y:this.ty,t:0,max:.15,r0:3,r1:10,c:'255,180,90'});
    }
    for(const e of g.enemies){
      if(!e.alive)continue;
      const d=Math.hypot(e.x-this.tx,e.y-this.ty);
      if(e===this.t&&d<=e.r+12){
        g.hurt(e,this.dmg);
        if(this.slow&&e.alive){e.slowT=this.spec.slowDur;e.slowF=Math.max(e.slowF*(e.slowT>0?1:0),this.slow)}
      }
      else if(this.spec.splash&&d<=this.spec.splash+e.r)g.hurt(e,Math.ceil(this.dmg*0.45));
    }
  }
}

/* ================= game ================= */
const G={
  state:'title', level:LEVELS[0], li:0, unlocked:1, cleared:[],
  path:LEVELS[0].path, spots:[],
  gold:0, lives:0, waveIdx:0, speed:1, time:0, kills:0,
  enemies:[], shots:[], towers:[], rings:[], texts:[], sparks:[],
  spawnQ:[], qi:0, spawnT:0, inWave:false, sel:null,

  loadLevel(i){
    this.li=i; this.level=LEVELS[i]; this.path=this.level.path;
    this.spots=this.level.spots.map(p=>({x:p[0],y:p[1],tower:null}));
    this.gold=this.level.gold; this.lives=this.level.lives;
    this.waveIdx=0; this.speed=1; this.kills=0;
    this.enemies=[];this.shots=[];this.towers=[];this.rings=[];this.texts=[];this.sparks=[];
    this.spawnQ=[];this.qi=0;this.spawnT=0;this.inWave=false;this.sel=null;
    el('speedBtn').textContent='1×'; el('speedBtn').classList.remove('on');
    buildBG(); refreshDock();
  },
  startWave(){
    if(this.inWave||this.waveIdx>=this.level.waves.length)return;
    this.spawnQ=[]; this.qi=0; this.spawnT=0; let at=0.4;
    for(const[type,n,gap] of this.level.waves[this.waveIdx]){
      for(let i=0;i<n;i++){this.spawnQ.push({type,at}); at+=gap}
      at+=1.4;
    }
    this.inWave=true;
    const last=this.waveIdx===this.level.waves.length-1;
    banner(last?'FINAL WAVE!':'Wave '+(this.waveIdx+1));
    A.sfx('wave');
    refreshDock();
  },
  remaining(){return this.enemies.length+(this.spawnQ.length-this.qi)},
  spark(x,y,c,n){
    if(this.sparks.length>70)return;
    for(let i=0;i<n;i++){
      const a=Math.random()*6.28, v=40+Math.random()*70;
      this.sparks.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,t:0,max:.35,c});
    }
  },
  hurt(e,d){
    if(!e.alive)return;
    e.hp-=d;
    if(e.hp<=0){
      e.dead=true; this.gold+=e.gold; this.kills++;
      A.sfx('die');
      this.texts.push({x:e.x,y:e.y-e.r-4,t:0,txt:'+'+e.gold,c:'#ffd97a'});
      this.rings.push({x:e.x,y:e.y,t:0,max:.3,r0:e.r,r1:e.r+18,c:'255,255,255'});
    }
  },
  leak(e){
    this.lives=Math.max(0,this.lives-e.livesCost);
    A.sfx('leak');
    const ex=this.path[this.path.length-1];
    this.rings.push({x:ex[0],y:Math.min(ex[1],620),t:0,max:.4,r0:10,r1:46,c:'255,93,93'});
    const h=el('hurt'); h.classList.add('on');
    setTimeout(()=>h.classList.remove('on'),90);
    if(this.lives<=0)this.end(false);
  },
  end(won){
    this.state=won?'win':'lose'; this.sel=null; refreshDock();
    A.sfx(won?'win':'lose');
    if(won){
      if(!this.cleared.includes(this.li))this.cleared.push(this.li);
      this.unlocked=Math.max(this.unlocked,this.li+2);
    }
    el('endTitle').textContent=won?'VICTORY!':'DEFEAT';
    el('endScr').classList.toggle('lose',!won);
    el('endMsg').textContent=won
      ?`${this.level.name} cleared with ${this.lives} ${this.lives===1?'life':'lives'} left and ${this.kills} enemies defeated!`
      :`The invaders broke through ${this.level.name} on wave ${this.waveIdx+1}. ${this.kills} defeated — try a new strategy!`;
    el('nextBtn').style.display=(won&&this.li+1<LEVELS.length)?'':'none';
    el('endScr').classList.add('show');
  },
  update(dt){
    if(this.inWave){
      this.spawnT+=dt;
      while(this.qi<this.spawnQ.length&&this.spawnQ[this.qi].at<=this.spawnT){
        this.enemies.push(new Enemy(this.spawnQ[this.qi].type,this.waveIdx+1,this.level)); this.qi++;
      }
    }
    for(const e of this.enemies){
      if(e.alive)e.update(dt);
      if(e.finished&&!e.leaked){e.leaked=true;this.leak(e)}
    }
    if(this.state!=='play')return;
    for(const t of this.towers)t.update(dt,this);
    for(const p of this.shots)if(!p.done)p.update(dt,this);
    this.shots=this.shots.filter(p=>!p.done);
    this.enemies=this.enemies.filter(e=>e.alive);
    for(const r of this.rings)r.t+=dt;
    this.rings=this.rings.filter(r=>r.t<r.max);
    for(const f of this.texts)f.t+=dt;
    this.texts=this.texts.filter(f=>f.t<0.9);
    for(const s of this.sparks){s.t+=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=160*dt}
    this.sparks=this.sparks.filter(s=>s.t<s.max);
    if(this.inWave&&this.qi>=this.spawnQ.length&&this.enemies.length===0){
      const done=this.waveIdx+1, bonus=15+3*done;
      this.gold+=bonus; this.inWave=false; this.waveIdx++;
      if(this.waveIdx>=this.level.waves.length){this.end(true)}
      else{
        toast(`Wave ${done} cleared! +${bonus} gold`);
        refreshDock();
      }
    }
  }
};

/* ================= rendering ================= */
const bg=document.createElement('canvas');
function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();
}
function buildBG(){
  if(!cv.width)return;
  bg.width=cv.width; bg.height=cv.height;
  const c=bg.getContext('2d'), pal=G.level.pal, P=G.path;
  c.setTransform(cv.width/LW,0,0,cv.height/LH,0,0);
  c.fillStyle=pal.g1; c.fillRect(0,0,LW,LH);
  c.fillStyle=pal.g2;
  for(let i=0;i<LW/40;i++)for(let j=0;j<LH/40;j++)
    if((i+j)%2===0)c.fillRect(i*40,j*40,40,40);
  c.fillStyle='rgba(255,255,255,.14)'; let sd=7;
  const rnd=()=>{sd=(sd*16807)%2147483647;return sd/2147483647};
  for(let i=0;i<46;i++)c.fillRect(rnd()*LW,rnd()*LH,3,3);
  c.lineJoin='round'; c.lineCap='round';
  const trace=()=>{c.beginPath();c.moveTo(P[0][0],P[0][1]);
    for(let i=1;i<P.length;i++)c.lineTo(P[i][0],P[i][1])};
  trace(); c.strokeStyle=pal.pe; c.lineWidth=44; c.stroke();
  trace(); c.strokeStyle=pal.pf; c.lineWidth=36; c.stroke();
  trace(); c.strokeStyle=pal.dash; c.lineWidth=3;
  c.setLineDash([10,14]); c.stroke(); c.setLineDash([]);
  /* entrance arch */
  const st=P[0],s2=P[1];
  const sa=Math.atan2(s2[1]-st[1],s2[0]-st[0]);
  const ax=Math.max(2,Math.min(478,st[0])),ay=Math.max(2,Math.min(638,st[1]));
  c.fillStyle='#314257';
  c.beginPath(); c.arc(ax,ay,28,sa-Math.PI/2,sa+Math.PI/2); c.closePath(); c.fill();
  c.fillStyle='#1d2b3c';
  c.beginPath(); c.arc(ax,ay,18,sa-Math.PI/2,sa+Math.PI/2); c.closePath(); c.fill();
  /* keep at exit */
  const en=P[P.length-1];
  const kx=Math.max(34,Math.min(446,en[0])), ky=Math.min(en[1],604);
  c.fillStyle='#8a93a8'; rr(c,kx-34,ky,68,40,8); c.fill();
  c.fillStyle='#6c7689'; rr(c,kx-34,ky-8,14,16,3); c.fill(); rr(c,kx-7,ky-8,14,16,3); c.fill(); rr(c,kx+20,ky-8,14,16,3); c.fill();
  c.fillStyle='#4a3522'; c.beginPath(); c.arc(kx,ky+40,16,Math.PI,0); c.closePath(); c.fill();
  c.fillStyle='#e0484f';
  c.beginPath(); c.moveTo(kx,ky-16); c.lineTo(kx,ky-32); c.lineTo(kx+18,ky-26); c.lineTo(kx,ky-20); c.fill();
  c.strokeStyle='#3a2a1a'; c.lineWidth=2;
  c.beginPath(); c.moveTo(kx,ky-16); c.lineTo(kx,ky-34); c.stroke();
  /* pads */
  for(const s of G.spots){
    c.fillStyle=pal.pad;
    c.beginPath(); c.arc(s.x,s.y,22,0,7); c.fill();
    c.strokeStyle=pal.padE; c.lineWidth=2.5; c.setLineDash([6,5]);
    c.beginPath(); c.arc(s.x,s.y,17,0,7); c.stroke(); c.setLineDash([]);
  }
}
function resize(){
  const st=el('stage').getBoundingClientRect();
  const scale=Math.min((st.width-8)/LW,(st.height-8)/LH,1.4);
  const w=Math.floor(LW*scale), h=Math.floor(LH*scale);
  cv.style.width=w+'px'; cv.style.height=h+'px';
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr);
  ctx.setTransform(cv.width/LW,0,0,cv.height/LH,0,0);
  buildBG();
}
window.addEventListener('resize',resize);
if(window.ResizeObserver)new ResizeObserver(()=>resize()).observe(el('stage'));

function drawEnemy(e){
  const bob=1+0.05*Math.sin(G.time*8+e.seed);
  ctx.save(); ctx.translate(e.x,e.y);
  if(e.type==='t'){
    ctx.fillStyle=E_TYPES.t.c2; rr(ctx,-e.r-2,-e.r-2,(e.r+2)*2,(e.r+2)*2,7); ctx.fill();
    ctx.fillStyle=E_TYPES.t.c1; rr(ctx,-e.r+1,-e.r+1,(e.r-1)*2,(e.r-1)*2,5); ctx.fill();
    ctx.fillStyle=E_TYPES.t.c2;
    for(const[bx,by]of[[-9,-9],[9,-9],[-9,9],[9,9]]){ctx.beginPath();ctx.arc(bx,by,2.4,0,7);ctx.fill()}
  }else{
    if(e.type==='f'){
      ctx.fillStyle='rgba(255,210,63,.35)';
      ctx.beginPath();
      ctx.moveTo(-e.dx*e.r*2.4,-e.dy*e.r*2.4);
      ctx.lineTo(-e.dy*e.r*.8,e.dx*e.r*.8);
      ctx.lineTo(e.dy*e.r*.8,-e.dx*e.r*.8);
      ctx.closePath(); ctx.fill();
    }
    const t=E_TYPES[e.type];
    ctx.fillStyle=t.c2; ctx.beginPath(); ctx.arc(0,0,e.r*bob+1.5,0,7); ctx.fill();
    ctx.fillStyle=t.c1; ctx.beginPath(); ctx.arc(0,0,e.r*bob,0,7); ctx.fill();
    if(e.type==='x'){ /* boss crown */
      ctx.fillStyle='#ffc94d';
      for(const o of[-10,0,10]){
        ctx.beginPath();
        ctx.moveTo(o-5,-e.r-2); ctx.lineTo(o,-e.r-13); ctx.lineTo(o+5,-e.r-2);
        ctx.closePath(); ctx.fill();
      }
    }
  }
  if(e.slowT>0){
    ctx.strokeStyle='rgba(120,220,255,.85)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,e.r+4,0,7); ctx.stroke();
  }
  const ex=e.dx*e.r*.42, ey=e.dy*e.r*.42, sp=e.r*.36;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(ex-e.dy*sp,ey+e.dx*sp,e.r*.26,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+e.dy*sp,ey-e.dx*sp,e.r*.26,0,7); ctx.fill();
  ctx.fillStyle='#26222b';
  ctx.beginPath(); ctx.arc(ex-e.dy*sp+e.dx*1.5,ey+e.dx*sp+e.dy*1.5,e.r*.13,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+e.dy*sp+e.dx*1.5,ey-e.dx*sp+e.dy*1.5,e.r*.13,0,7); ctx.fill();
  if(e.hp<e.maxHp){
    const w=Math.max(22,e.r*2),y=-e.r-(e.type==='x'?17:9);
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(-w/2,y,w,4);
    ctx.fillStyle=e.hp/e.maxHp>.4?'#67d066':'#ff5d5d';
    ctx.fillRect(-w/2,y,w*Math.max(0,e.hp/e.maxHp),4);
  }
  ctx.restore();
}
function drawTower(t){
  const col=t.spec.color;
  ctx.save(); ctx.translate(t.x,t.y);
  ctx.fillStyle='#2c3850'; ctx.beginPath(); ctx.arc(0,1.5,16,0,7); ctx.fill();
  ctx.fillStyle='#4a5a7d'; ctx.beginPath(); ctx.arc(0,0,15,0,7); ctx.fill();
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
  ctx.rotate(t.angle);
  if(t.type==='bolt'){
    ctx.strokeStyle='#8a5a1c'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(10,0,9,-2,2); ctx.stroke();
    ctx.fillStyle='#222b3f'; rr(ctx,-4,-2.5,26,5,2.5); ctx.fill();
  }else if(t.type==='frost'){
    ctx.fillStyle='#222b3f'; rr(ctx,-4,-4.5,20,9,4); ctx.fill();
    ctx.fillStyle='#bdf0ff';
    ctx.save(); ctx.translate(17,0); ctx.rotate(Math.PI/4);
    rr(ctx,-5,-5,10,10,2); ctx.fill(); ctx.restore();
  }else{
    ctx.fillStyle='#222b3f'; rr(ctx,-4,-5.5,26,11,4.5); ctx.fill();
    ctx.fillStyle='#39455f'; rr(ctx,14,-6.5,8,13,3); ctx.fill();
  }
  if(t.flash>0){
    ctx.fillStyle=`rgba(255,222,120,${t.flash/0.09})`;
    ctx.beginPath(); ctx.arc(26,0,7,0,7); ctx.fill();
  }
  ctx.rotate(-t.angle);
  ctx.fillStyle='#1a2438'; ctx.beginPath(); ctx.arc(0,0,5.5,0,7); ctx.fill();
  ctx.fillStyle='#ffc94d';
  for(let i=0;i<=t.lv;i++){ctx.beginPath();ctx.arc((i-t.lv/2)*8,23,2.8,0,7);ctx.fill()}
  ctx.restore();
}
function draw(){
  if(!bg.width)return;
  ctx.drawImage(bg,0,0,LW,LH);
  const selT=G.sel&&G.sel.tower;
  if(selT){
    ctx.fillStyle='rgba(255,201,77,.12)'; ctx.strokeStyle='rgba(255,201,77,.55)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(selT.x,selT.y,selT.s.range,0,7); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#ffc94d'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(selT.x,selT.y,20,0,7); ctx.stroke();
  }else if(G.sel){ /* empty pad selected: highlight + typical range */
    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2; ctx.setLineDash([7,7]);
    ctx.beginPath(); ctx.arc(G.sel.x,G.sel.y,95,0,7); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle='#fff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(G.sel.x,G.sel.y,24,0,7); ctx.stroke();
  }
  if(G.state==='play'&&!G.sel){
    const minCost=40;
    if(G.gold>=minCost){
      const a=.3+.18*Math.sin(G.time*4);
      ctx.strokeStyle=`rgba(255,225,130,${a})`; ctx.lineWidth=3;
      for(const s of G.spots)if(!s.tower){
        ctx.beginPath(); ctx.arc(s.x,s.y,24,0,7); ctx.stroke();
      }
    }
  }
  for(const e of G.enemies)drawEnemy(e);
  for(const t of G.towers)drawTower(t);
  for(const p of G.shots){
    if(p.type==='bolt'){
      ctx.strokeStyle='#7a4a14'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(p.x-Math.cos(p.ang)*6,p.y-Math.sin(p.ang)*6);
      ctx.lineTo(p.x+Math.cos(p.ang)*6,p.y+Math.sin(p.ang)*6);
      ctx.stroke();
    }else if(p.type==='frost'){
      ctx.fillStyle='#8ce0ff'; ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,7); ctx.fill();
      ctx.fillStyle='#e8fbff'; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,7); ctx.fill();
    }else{
      ctx.fillStyle='#262d3d'; ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,7); ctx.fill();
    }
  }
  for(const s of G.sparks){
    ctx.fillStyle=s.c; ctx.globalAlpha=1-s.t/s.max;
    ctx.fillRect(s.x-1.5,s.y-1.5,3,3);
  }
  ctx.globalAlpha=1;
  for(const r of G.rings){
    const k=r.t/r.max;
    ctx.strokeStyle=`rgba(${r.c},${1-k})`; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r0+(r.r1-r.r0)*k,0,7); ctx.stroke();
  }
  ctx.font='800 14px '+getComputedStyle(document.body).fontFamily;
  ctx.textAlign='center';
  for(const f of G.texts){
    ctx.fillStyle=f.c; ctx.globalAlpha=1-f.t/0.9;
    ctx.fillText(f.txt,f.x,f.y-f.t*30);
  }
  ctx.globalAlpha=1;
}

/* ================= main loop ================= */
let last=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(ts-last)/1000||0); last=ts;
  G.time+=dt;
  if(G.state==='play')G.update(dt*G.speed);
  draw(); updateHUD();
}
makeBuildButtons();
G.loadLevel(0);
G.state='title';
resize();
requestAnimationFrame(frame);
</script>
</body>
